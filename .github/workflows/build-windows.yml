name: Build Windows Portable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Build Frontend
        working-directory: webapp
        run: |
          npm ci
          npm run build

      - name: Install Python Dependencies
        run: |
          pip install -r server/requirements.txt
          pip install pythonnet clr_loader
          pip install pyinstaller

      - name: Package with PyInstaller
        run: pyinstaller capsule-transfer.spec

      - name: Copy server modules into package
        run: |
          New-Item -ItemType Directory -Force dist/CapsuleTransfer/server
          Copy-Item server/app.py dist/CapsuleTransfer/server/
          Copy-Item server/bundle.py dist/CapsuleTransfer/server/
          Copy-Item server/net.py dist/CapsuleTransfer/server/

      - name: Copy frontend dist into package
        run: |
          Copy-Item -Recurse webapp/dist dist/CapsuleTransfer/webapp

      - name: Copy data-pipeline into package
        run: |
          Copy-Item -Recurse data-pipeline dist/CapsuleTransfer/data-pipeline

      - name: Create data directory
        run: |
          New-Item -ItemType Directory -Force dist/CapsuleTransfer/data/capsules

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CapsuleTransfer-Windows-Portable
          path: dist/CapsuleTransfer

      - name: Create ZIP for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          Compress-Archive -Path dist/CapsuleTransfer -DestinationPath CapsuleTransfer-Windows-Portable.zip

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CapsuleTransfer-Windows-Portable.zip
          generate_release_notes: true
