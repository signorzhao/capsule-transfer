name: Build Windows (Tauri)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        working-directory: webapp
        run: npm ci

      - name: Install Python dependencies & build sidecar
        run: |
          pip install -r server/requirements.txt
          pip install pyinstaller
          pyinstaller flask-backend.spec --noconfirm
          New-Item -ItemType Directory -Force src-tauri/binaries
          Copy-Item dist/flask-backend.exe src-tauri/binaries/flask-backend-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        run: npx --prefix webapp tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoundCapsule-Windows
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
