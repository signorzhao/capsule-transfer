name: Build Windows Portable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            tools/capsule-updater

      - name: Install frontend dependencies
        working-directory: webapp
        run: npm ci

      - name: Build frontend
        working-directory: webapp
        run: npm run build

      - name: Build updater
        run: cargo build --release --manifest-path tools/capsule-updater/Cargo.toml

      - name: Install Python dependencies & build sidecar
        run: |
          pip install -r server/requirements.txt
          pip install pyinstaller
          pyinstaller flask-backend.spec --noconfirm
          New-Item -ItemType Directory -Force src-tauri/binaries
          Copy-Item dist/flask-backend.exe src-tauri/binaries/flask-backend.exe

      - name: Build Tauri app
        run: npx --prefix webapp tauri build

      - name: Assemble portable package
        run: |
          $version = "0.7.0"
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          $parts = $version.Split(".")
          $major = if ($parts.Length -gt 0) { [int]$parts[0] } else { 0 }
          $minor = if ($parts.Length -gt 1) { [int]$parts[1] } else { 0 }
          $patch = if ($parts.Length -gt 2) { [int]$parts[2] } else { 0 }
          $build = $major * 10000 + $minor * 100 + $patch
          $packageDir = "Capsule LAN"
          New-Item -ItemType Directory -Force $packageDir
          # Tauri 编译产物
          $appExe = @(
            "src-tauri/target/release/Capsule LAN.exe",
            "src-tauri/target/release/CapsuleTransfer.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $appExe) { throw "Cannot find built Capsule LAN executable." }
          Copy-Item $appExe "$packageDir/Capsule LAN.exe"
          # Flask 后端 sidecar
          Copy-Item dist/flask-backend.exe "$packageDir/"
          # 自更新器
          $updaterExe = @(
            "tools/capsule-updater/target/release/capsule-updater.exe",
            "target/release/capsule-updater.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $updaterExe) { throw "Cannot find built capsule-updater executable." }
          Copy-Item $updaterExe "$packageDir/"
          # data-pipeline
          Copy-Item -Recurse data-pipeline "$packageDir/data-pipeline"
          # 前端（Flask 需要）
          Copy-Item -Recurse webapp/dist "$packageDir/webapp"
          # 版本与更新配置
          @{
            version = $version
            build = $build
            channel = "stable"
          } | ConvertTo-Json | Set-Content -Encoding UTF8 "$packageDir/version.json"
          Copy-Item update-config.json "$packageDir/update-config.json"
          # 创建数据目录
          New-Item -ItemType Directory -Force "$packageDir/data/capsules"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Capsule-LAN-Windows-Portable
          path: Capsule LAN

      - name: Create ZIP for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "Capsule LAN" -DestinationPath "Capsule-LAN-$tag-windows-x64-portable.zip"

      - name: Create update manifest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $zip = "Capsule-LAN-$tag-windows-x64-portable.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Set-Content -Encoding ASCII "$zip.sha256"
          $parts = $version.Split(".")
          $major = if ($parts.Length -gt 0) { [int]$parts[0] } else { 0 }
          $minor = if ($parts.Length -gt 1) { [int]$parts[1] } else { 0 }
          $patch = if ($parts.Length -gt 2) { [int]$parts[2] } else { 0 }
          $build = $major * 10000 + $minor * 100 + $patch
          $size = (Get-Item $zip).Length
          @{
            app = "Capsule LAN"
            channel = "stable"
            version = $version
            build = $build
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            notes = @("请查看本版本发布说明。")
            platforms = @{
              "windows-x64-portable" = @{
                url = $zip
                sha256 = $hash
                size = $size
              }
            }
          } | ConvertTo-Json -Depth 5 | Set-Content -Encoding UTF8 latest.json

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Capsule-LAN-${{ github.ref_name }}-windows-x64-portable.zip
            Capsule-LAN-${{ github.ref_name }}-windows-x64-portable.zip.sha256
            latest.json
          generate_release_notes: true
